name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore Marketplace.sln

      - name: Build
        working-directory: backend
        run: dotnet build Marketplace.sln --configuration Release --no-restore

      - name: Test
        working-directory: backend
        run: dotnet test Marketplace.sln --configuration Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/tg-deal/package-lock.json

      - name: Install deps
        working-directory: frontend/tg-deal
        run: npm ci

      - name: Build
        working-directory: frontend/tg-deal
        run: npm run build

  docker-images:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity
            dockerfile: src/Services/Identity/Identity.Host/Dockerfile
          - service: publishers
            dockerfile: src/Services/Publishers/Publishers.Host/Dockerfile
          - service: channelcatalog
            dockerfile: src/Services/ChannelCatalog/ChannelCatalog.Host/Dockerfile
          - service: deals
            dockerfile: src/Services/Deals/Deals.Host/Dockerfile
          - service: payments
            dockerfile: src/Services/Payments/Payments.Host/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/tg-deal-${{ matrix.service }}:${{ github.sha }}

  smoke-staging:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env
        working-directory: deploy
        run: cp .env.example .env

      - name: Start staging compose
        run: |
          ASPNETCORE_ENVIRONMENT=Staging DATABASE_AUTO_MIGRATE=false docker compose -f deploy/docker-compose.yml --profile staging up -d --build

      - name: Run smoke checks
        run: |
          set -a
          source deploy/.env
          set +a
          ./deploy/scripts/smoke-staging.sh

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml --profile staging logs --no-color

      - name: Shutdown
        if: always()
        run: docker compose -f deploy/docker-compose.yml --profile staging down -v
